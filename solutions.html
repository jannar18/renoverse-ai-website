<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--white);color:var(--ink)}
  body{
    font-family:var(--font-sans);
    font-weight:400;
    font-size:var(--fs-body);
    line-height:var(--lh-body);
    -webkit-font-smoothing:antialiased;
  }
  img{display:block;max-width:100%}
  a{color:inherit;text-decoration:none}

  .wrap{max-width:var(--container);margin:0 auto;padding:0 var(--gutter)}

  /* ---------- page hero (paper, no video) ----------
     Solid-mode nav covers ~96px; pad the hero so the H1 clears the
     floating frosted bar without overlap. Heroes are centered as a
     block (H1 is centered as a defining property; the lead under it
     follows the same axis to read as one composition). */
  /* Hero composition mirrors the homepage hero: flex column centered
     vertically, content left-aligned (H1 + lead share the left axis).
     min-height is capped below 100vh so the first feature row's eyebrow +
     H2 peek into the first viewport on entry, signaling the deep dive
     below — taller than a paper title block, shorter than a full hero. */
  .page-hero{
    position:relative;
    isolation:isolate;
    overflow:hidden;
    min-height:clamp(516px, 57.5vh, 696px);
    padding:calc(var(--nav-height) + 28px) 0 clamp(48px, 6vw, 72px);
    background:var(--grad-ice-cream-beige);
    display:flex;
    align-items:center;
  }
  .page-hero .wrap{ width:100%; text-align:left; }
  .page-hero h1{
    font-family:var(--font-serif);
    font-style:italic;
    font-weight:600;
    font-size:var(--fs-h1);
    line-height:var(--lh-h1);
    letter-spacing:var(--ls-display);
    color:var(--ink);
    margin:0;
    max-width:16ch;
  }
  /* Hero subtitle — Lead tier. Body font/size in the softer --ink-soft
     shade so the subtitle sits visually below the H1. */
  .page-hero p{
    margin:24px 0 0;
    font-family:var(--font-sans);
    font-weight:400;
    font-size:var(--fs-body);
    line-height:var(--lh-body);
    color:var(--ink-soft);
    max-width:60ch;
  }

</style>
</head>
<body>

<a class="skip-link" href="#main">Skip to main content</a>

<!-- ========== NAV (shared component) ========== -->
<nav data-site-nav data-mode="solid"></nav>

<main id="main">

  <!-- ========== PAGE HERO ========== -->
  <section class="page-hero">
    <div class="wrap">
      <h1>One workspace.</h1>
      <p>
        Renoverse AI is the intelligent information management &amp; coordination layer
        centralizing fragmented workflows so everyone knows where things stand.
      </p>
    </div>
  </section>

  <!-- ========== CORE CAPABILITIES (alternating, deep dive) ==========
       Phase 15: same alternating-features primitive used on the homepage,
       but each row swaps body+CTA for three sub-bullets (label + body)
       sourced from the Renoverse AI Platform Overview pages 5–8. CTAs
       suppressed via data-cta-hidden — Solutions IS the deep dive page,
       so per-row "See solutions" links would loop on themselves. The 4th
       row (Controlled Stakeholder Access) uses a placeholder hash matching
       the team-section media-ph until a real visual is designed. -->
  <div data-features-alternating
       data-cta-hidden="1"
       data-items='[
         {
           "eyebrow": "Capture",
           "title": "Email Triage & Auto-Capture",
           "image": "assets/feature-email-triage.png",
           "alt": "Renoverse Ella AI triage inbox surfacing decisions, questions, and action items extracted from project emails",
           "side": "image-right",
           "bullets": [
             { "label": "Automated Information Capture", "body": "Connect email to automatically surface decisions, action items, and open questions — organized by project and prepped for human review." },
             { "label": "Human-in-the-Loop Controls", "body": "You stay in control of what gets logged — review the triage queue and approve, edit, or skip anything Ella AI surfaces." },
             { "label": "Comprehensive Organization", "body": "Ensure essential information is organized and easily accessible, preventing valuable insights from being lost amidst the clutter of fragmented communications." }
           ]
         },
         {
           "eyebrow": "Track",
           "title": "Decision Log & Audit Trail",
           "image": "assets/feature-decision-log.png",
           "alt": "Renoverse decision log with timestamped audit trail tracing a backsplash tile selection from first log to final approval",
           "side": "image-left",
           "bullets": [
             { "label": "Tracked Approvals", "body": "Every decision made within Renoverse is meticulously tracked, ensuring all approvals are logged and easily accessible for review, enhancing transparency among team members." },
             { "label": "Timestamped Decisions", "body": "With each decision timestamped, users can effortlessly identify when decisions were made, providing an accurate historical record that supports accountability and informed decision-making." },
             { "label": "Comprehensive Audit Trail", "body": "The digital audit trail captures all changes, creating a detailed history of project decisions that helps teams understand the context and reasoning behind each action taken." }
           ]
         },
         {
           "eyebrow": "Connect",
           "title": "Intelligence Layer on Existing Stack",
           "image": "assets/feature-intelligence-layer.png",
           "alt": "Renoverse Connectors page showing Gmail, Outlook, and other communication and storage integrations",
           "side": "image-right",
           "bullets": [
             { "label": "Existing Stack", "body": "Renoverse integrates with your current software tools, ensuring minimal lift to improved project coordination without overhauling existing workflows." },
             { "label": "Microsoft Integrations", "body": "Integrates natively with Microsoft email & tools, so critical information is captured automatically, ensuring project context doesn’t slip through the cracks." },
             { "label": "Coordination Layer", "body": "Enhances your existing infrastructure with a smart coordination layer, promoting collaborative projects while centralizing decision tracking and communication across various teams and tools." }
           ]
         },
         {
           "title": "Controlled Stakeholder Access",
           "side": "image-left",
           "placeholder": true,
           "placeholderTag": "Image placeholder",
           "placeholderLabel": "Stakeholder access view",
           "bullets": [
             { "label": "Private Workspace", "body": "Protect sensitive information with a dedicated team space, ensuring only authorized members can access critical project details and discussions pertinent to their roles." },
             { "label": "Professional Layer (Pro-to-Pro)", "body": "Collaborators can engage with relevant project information, allowing for streamlined interactions without overwhelming them with unnecessary data or access to restricted content." },
             { "label": "Client-Facing View (Client)", "body": "Share tailored insights with clients, offering them visibility into the project’s progress while maintaining control over the sensitive internal discussions and decisions made by the team." }
           ]
         }
       ]'></div>

  <!-- ========== ADDITIONAL CAPABILITIES (3-up) ==========
       The "4 main, 3 additional" hierarchy beat. Same product-features-card
       primitive as the homepage 2x2, mounted with cols=3 + a heading slot
       + no CTA (Solutions IS the destination — a self-loop CTA would be
       redundant). The 3 cards reuse the existing pillar-* assets. -->
  <div data-product-features-card-3x1
       data-heading="And the rest comes built-in."
       data-items='[
         {
           "title": "Frictionless collaboration",
           "body": "Consolidate communication in one unified workspace — so nothing gets lost across emails and texts.",
           "image": "assets/pillar-collaborators.png",
           "alt": "Project collaborators panel showing architects, contractors, designers, and homeowners on a single project"
         },
         {
           "title": "Version control",
           "body": "Manage design plan revisions so all stakeholders collaborate on the correct set.",
           "image": "assets/pillar-comments.png",
           "alt": "Drawing v3 with anchored comments threaded against specific revisions"
         },
         {
           "title": "AI assistant",
           "body": "Automate repetitive admin, query project info & town documents, and field homeowner questions.",
           "image": "assets/pillar-tasks.png",
           "alt": "Ella AI activity summary surfacing tasks, queries, and homeowner questions ready for review"
         }
       ]'></div>
