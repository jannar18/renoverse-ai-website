<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Book a demo — Renoverse</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/favicon/favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400;1,600;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Preload Tailwind config + Play CDN so the demo-form's utility
     classes are ready before the component mounts. (The component
     would auto-inject these, but doing it here avoids the first-paint
     race that left the form card unstyled.) -->
<script>
  window.tailwind = window.tailwind || {};
  window.tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink:        '#0a0a0a',
          'ink-soft': '#3a3a3a',
          paper:      '#FAFAF7',
          surface:    '#FFFFFF',
          cream:      '#F2EBD8',
          ice:        '#E5F4F1',
          azure:      '#7FE3CB',
          aqua:       '#5EC9B7',
          teal:       '#2D6F75',
          oxford:     '#5D6FB8',
          'brand-blue': '#5BA7C9',
          line:       'rgba(0,0,0,.10)',
        },
        fontFamily: { sans: ['Poppins','system-ui','sans-serif'] },
        boxShadow: {
          card: '0 30px 60px -30px rgba(11,26,43,.18), 0 8px 20px -10px rgba(11,26,43,.08)',
        },
      },
    },
  };
</script>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>

<link rel="stylesheet" href="shared/tokens.css">
<link rel="stylesheet" href="shared/effects.css">
<link rel="stylesheet" href="shared/button.css">
<link rel="stylesheet" href="shared/components/site-nav/index.css">
<link rel="stylesheet" href="shared/components/demo-form/index.css">
<link rel="stylesheet" href="shared/components/site-footer/index.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink)}
  body{
    font-family:var(--font-sans);
    font-weight:400;
    font-size:var(--fs-body);
    line-height:var(--lh-body);
    -webkit-font-smoothing:antialiased;
  }
  img{display:block;max-width:100%}
  a{color:inherit;text-decoration:none}

  /* ---------- demo page shell ---------- */
  /* The form already has ~56–128px of internal top padding, which is
     plenty of clearance for the absolute nav — so we don't add any
     padding here. Adding padding leaves a plain-white strip above the
     form's gradient that the transparent nav sits on, which reads as
     a header bug. */
  .demo-page{ position:relative; background:var(--bg) }

</style>
</head>
<body>

<a class="skip-link" href="#main">Skip to main content</a>

<!-- ========== NAV (shared component) ========== -->
<nav data-site-nav data-mode="solid"></nav>

<!-- ========== DEMO FORM ========== -->
<main class="demo-page" id="main">
  <div id="demo-form" data-demo-form></div>
</main>

<!-- ========== FOOTER ========== -->
<footer class="site-footer" data-site-footer></footer>

<script src="shared/components/site-nav/index.js"></script>
<script src="shared/components/demo-form/index.js"></script>
<script>
  // Hook submission for now — log to console. Swap for a real backend
  // once the endpoint is decided (see NOTES.md → Demo flow).
  document.addEventListener('demo-form:submit', (e) => {
    console.log('[demo] submission:', e.detail.values);
  });
</script>

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "@paper-design/shaders-react": "https://esm.sh/@paper-design/shaders-react@0.0.76?deps=react@18.3.1,react-dom@18.3.1"
  }
}
</script>
<script type="module" src="shared/components/site-footer/index.js"></script>

</body>
</html>
