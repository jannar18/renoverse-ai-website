<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>demo-video — test</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600&family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../../tokens.css">
<link rel="stylesheet" href="../../effects.css">
<link rel="stylesheet" href="./index.css">

<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--white);color:var(--ink);font-family:var(--font-sans)}
  .stage{display:grid;gap:0}
  .label{
    font-family:var(--font-mono);
    font-size:var(--fs-eyebrow);
    letter-spacing:var(--xwide);
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0;
    padding:48px var(--gutter) 12px;
    max-width:var(--container);
    margin-left:auto;margin-right:auto;
    width:100%;
  }
</style>
</head>
<body>

<div class="stage">

  <p class="label">Mode 1 — with poster (canonical)</p>
  <div data-demo-video
       data-src="../../../assets/demo-cran.mp4"
       data-poster="../../../assets/demo-cran-poster.jpg"
       data-mime="video/mp4"
       data-label="Renoverse CRAN demo"></div>

  <p class="label">Mode 2 — no poster (browser shows black until play)</p>
  <div data-demo-video
       data-src="../../../assets/demo-cran.mp4"
       data-mime="video/mp4"
       data-label="Renoverse CRAN demo (no poster)"></div>

</div>

<script src="./index.js"></script>

</body>
</html>
