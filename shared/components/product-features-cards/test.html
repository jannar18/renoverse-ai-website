<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>product-features-cards — test</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600&family=Cormorant+Garamond:ital,wght@1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../../tokens.css">
<link rel="stylesheet" href="../../effects.css">
<link rel="stylesheet" href="../../button.css">
<link rel="stylesheet" href="./index.css">

<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--white);color:var(--ink);font-family:var(--font-sans)}
  .host-paper-warm{
    background:radial-gradient(120% 80% at 50% 0%, var(--ice) 0%, var(--cream) 45%, var(--beige) 100%);
  }
  .test-label{
    font-family:var(--font-mono);
    font-size:var(--fs-eyebrow);
    letter-spacing:var(--xwide);
    text-transform:uppercase;
    color:var(--ink-soft);
    padding:24px var(--gutter) 8px;
  }
</style>
</head>
<body>

<!-- 2-col compact preset (homepage core capabilities) -->
<p class="test-label">data-cols="2" — homepage compact preset</p>
<div class="host-paper-warm">
  <div data-product-features-cards
       data-cols="2"
       data-cta-href="#"
       data-cta-label="See all features"
       data-items='[
         {
           "title": "Email Triage & Auto-Capture",
           "body": "The decisions buried in a 40-message chain don’t disappear. Ella AI automatically surfaces what matters — organized by project, ready to act on.",
           "image": "../../../assets/feature-email-triage.png",
           "alt": "Renoverse Ella AI triage inbox screenshot"
         },
         {
           "title": "Decision Log & Audit Trail",
           "body": "Know who decided what, when, and why. Every decision is captured, timestamped, and traceable from first log through final approval.",
           "image": "../../../assets/feature-decision-log.png",
           "alt": "Renoverse decision log audit trail screenshot"
         },
         {
           "title": "Intelligence Layer on Existing Stack",
           "body": "Nothing gets replaced. Renoverse connects to Microsoft 365 tools and acts as the intelligent coordination layer on top.",
           "image": "../../../assets/feature-intelligence-layer.png",
           "alt": "Renoverse Connectors page showing Microsoft integrations"
         },
         {
           "title": "Controlled Stakeholder Access",
           "body": "Three access tiers: internal team, professional collaborators, and client — so private work stays private.",
           "placeholder": true,
           "placeholderTag": "Image placeholder",
           "placeholderLabel": "Stakeholder access view"
         }
       ]'></div>
</div>

<!-- 3-col breathing preset (Solutions "rest comes built-in") -->
<p class="test-label">data-cols="3" — Solutions breathing preset</p>
<div data-product-features-cards
     data-cols="3"
     data-heading="And the rest comes built-in."
     data-items='[
       {
         "title": "Frictionless collaboration",
         "body": "Consolidate communication in one unified workspace — so nothing gets lost across emails and texts.",
         "image": "../../../assets/pillar-collaborators.png",
         "alt": "Project collaborators panel"
       },
       {
         "title": "Version control",
         "body": "Manage design plan revisions so all stakeholders collaborate on the correct set.",
         "image": "../../../assets/pillar-comments.png",
         "alt": "Drawing v3 with anchored comments"
       },
       {
         "title": "AI assistant",
         "body": "Automate repetitive admin, query project info & town documents, and field homeowner questions.",
         "image": "../../../assets/pillar-tasks.png",
         "alt": "Ella AI activity summary"
       }
     ]'></div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="./index.js"></script>

</body>
</html>
