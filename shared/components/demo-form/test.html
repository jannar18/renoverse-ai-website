<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>demo-form — isolated test host</title>

<!-- Tailwind Play CDN with @tailwindcss/forms plugin.
     The component will inject this if it's missing, but loading it
     ahead of time avoids the first-render flash of unstyled markup. -->
<script>
  window.tailwind = window.tailwind || {};
  window.tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink:           '#0a0a0a',
          'ink-soft':    '#3a3a3a',
          beige:         '#FAFAF7',
          white:         '#FFFFFF',
          cream:         '#F2EBD8',
          ice:           '#E5F4F1',
          'sky-blue':    '#7FE3CB',
          aqua:          '#5EC9B7',
          teal:          '#2D6F75',
          azure:         '#5D6FB8',
          'oxford-blue': '#022E41',
          'dark-oxford-blue': '#0B1A2B',
          'cool-blue':   '#5BA7C9',
          line:          'rgba(0,0,0,.10)',
        },
        fontFamily: { sans: ['Poppins','system-ui','sans-serif'] },
        boxShadow: {
          card: '0 30px 60px -30px rgba(11,26,43,.18), 0 8px 20px -10px rgba(11,26,43,.08)',
        },
      },
    },
  };
</script>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>

<link rel="stylesheet" href="../../tokens.css">
<link rel="stylesheet" href="../../effects.css">
<link rel="stylesheet" href="index.css">

<style>
  html, body {
    background: #FAFAF7;
    color: #0B1A2B;
    font: 15px/1.6 'Poppins', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .test-spacer {
    height: 30vh;
    display: grid;
    place-items: center;
    color: var(--ink, #0a0a0a);
    font-size: 11px;
    letter-spacing: .32em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="test-spacer">↓ demo-form component ↓</div>

<div data-demo-form></div>

<div class="test-spacer">↑ component ends above ↑</div>

<script src="index.js"></script>
<script>
  document.addEventListener('demo-form:submit', (e) => {
    console.log('demo-form:submit', e.detail.values);
  });
</script>
</body>
</html>
